name: Positron Academy Auto Poster

on:
  schedule:
    # Preserve the original four-run posting cadence. GitHub cron uses UTC.
    - cron: "30 1 * * *"  # 7:00 AM IST
    - cron: "30 2 * * *"  # 8:00 AM IST
    - cron: "30 11 * * *" # 5:00 PM IST
    - cron: "30 12 * * *" # 6:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: positron-auto-poster
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate content system
        run: python -m unittest discover -s tests -v

      - name: Publish next image and reel
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GRAPH_API_VERSION: v22.0
        run: python bot.py

      - name: Commit publishing progress
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.txt content_state.json
          if git diff --cached --quiet; then
            echo "No publishing progress to commit."
            exit 0
          fi
          git commit -m "chore: update auto-poster progress [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
