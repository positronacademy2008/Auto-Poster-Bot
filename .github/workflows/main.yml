name: Auto FB and IG Poster

on:
  schedule:
    - cron: '30 1 * * *'   # Subah 7:00 AM IST
    - cron: '30 12 * * *'  # Shaam 6:00 PM IST
  workflow_dispatch:        # Manual Button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Bot Script
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python bot.py

      - name: Commit Changes (Posted List Update)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add posted.txt
          git commit -m "Auto-update posted images list" || exit 0
          git push
