name: Positron Academy Master Bot

on:
  schedule:
    # Subah 7:00 AM IST (01:30 UTC)
    - cron: '30 1 * * *'
    # Shaam 6:00 PM IST (12:30 UTC)
    - cron: '30 12 * * *'
  workflow_dispatch: # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests selenium webdriver-manager
          # Linux par Chrome ke liye zaroori dependencies
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # --- Step 1: Run Social Media Bot (FB & IG) ---
      - name: Run FB & IG Bot
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: python bot.py

      # --- Step 2: Run WhatsApp Jugaad Bot (Session Based) ---
      - name: Run WhatsApp Bot
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python whatsapp_jugaad.py

      # --- Step 3: Save Progress (posted.txt ko update karne ke liye) ---
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add posted.txt
          git commit -m "Auto-update posted.txt [Skip CI]" || exit 0
          git push
