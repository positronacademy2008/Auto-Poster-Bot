- name: Run FB & IG Bot
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: python bot.py

      - name: Run WhatsApp Bot
        env:
          WA_TOKEN: ${{ secrets.WA_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
        run: python whatsapp_bot.py
