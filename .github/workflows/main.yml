name: Positron Academy Story Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run Auto Story Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: python bot.py

      - name: Save & Upload Story for Meta (CRITICAL)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          # Yahan temp_story.jpg ko add karna zaroori hai
          git add posted.txt temp_story.jpg
          git commit -m "Upload resized story for Meta URL [Skip CI]" || exit 0
          git push
