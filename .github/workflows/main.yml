name: Positron Academy Story Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests Pillow

      - name: Run Auto Story Bot & Upload Image
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Step 1: Run Python script. Script will create 'story_XYZ.jpg'
          python bot.py
          
          # Step 2: Push changes to Github immediately so the URL becomes active
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add posted.txt story_*.jpg
          git commit -m "Progress update and new story upload [Skip CI]" || exit 0
          git push
