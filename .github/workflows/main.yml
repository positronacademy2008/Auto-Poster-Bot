name: Auto FB Poster

on:
  schedule:
    # Ye roz subah 10:00 AM IST par chalega (UTC 4:30 AM)
    - cron: '30 1 * * *'
  workflow_dispatch: # Isse aap jab chahe manual button daba kar chala sakte hain

permissions:
  contents: write # Ye permission file wapas save karne ke liye zaroori hai

jobs:
  post-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Run Bot Script
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python bot.py

      - name: Save Post History
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Agar posted.txt nahi hai toh create karega
          touch posted.txt
          git add posted.txt
          git commit -m "Updated posted history [skip ci]" || echo "No changes to commit"
          git push origin main
